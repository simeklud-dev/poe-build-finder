services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-poe}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-poe}
      POSTGRES_DB: ${POSTGRES_DB:-poe_build_finder}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-poe} -d ${POSTGRES_DB:-poe_build_finder}"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
